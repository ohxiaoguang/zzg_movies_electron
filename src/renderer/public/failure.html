<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'none'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Film Library</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; }
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #0f1117; color: #edf1f7; }
      main { width: min(680px, calc(100vw - 64px)); padding: 34px; border: 1px solid #343b4b; border-radius: 16px; background: #171b25; box-shadow: 0 22px 60px rgba(0, 0, 0, .25); }
      h1 { margin: 0 0 12px; font-size: 25px; }
      p { color: #aeb8ca; line-height: 1.65; }
      code { color: #98e3c2; }
      .actions { display: flex; gap: 10px; margin-top: 25px; }
      button { padding: 10px 16px; border: 0; border-radius: 8px; background: #98e3c2; color: #102018; font-weight: 700; cursor: pointer; }
      button.secondary { background: #2c3443; color: #edf1f7; }
      button:disabled { cursor: not-allowed; opacity: .5; }
      #status { min-height: 1.4em; color: #f2c58f; font-size: 13px; }
    </style>
  </head>
  <body>
    <main>
      <h1>应用界面启动失败</h1>
      <p>应用核心进程仍在运行，但界面没有正常加载。请先打开日志目录查看诊断信息，再尝试重新加载。</p>
      <p>诊断原因：<code id="reason">unknown</code></p>
      <p id="status" role="status"></p>
      <div class="actions">
        <button id="open-logs" type="button">打开日志目录</button>
        <button id="reload" class="secondary" type="button">重新加载</button>
      </div>
    </main>
    <script src="./failure.js"></script>
  </body>
</html>
